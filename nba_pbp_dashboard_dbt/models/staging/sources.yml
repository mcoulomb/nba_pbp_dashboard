          - name: shotDistance
            data_type: FLOAT
            description: ''
          - name: shotResult
            data_type: STRING
            description: ''
          - name: shotActionNumber
            data_type: INTEGER
            description: ''
          - name: reboundTotal
            data_type: INTEGER
            description: ''
          - name: reboundDefensiveTotal
            data_type: INTEGER
            description: ''
          - name: reboundOffensiveTotal
            data_type: INTEGER
            description: ''
          - name: pointsTotal
            data_type: INTEGER
            description: ''
          - name: assistPlayerNameInitial
